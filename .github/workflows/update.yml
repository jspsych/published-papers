name: Monthly paper update

on:
  schedule:
    # 06:00 UTC on the 3rd of every month
    - cron: "0 6 3 * *"
  workflow_dispatch:

permissions:
  contents: write
  # Needed to dispatch the Pages deploy workflow after the data commit
  # (pushes made with the default GITHUB_TOKEN do not trigger push workflows).
  actions: write

# Prevent a manual dispatch from racing the scheduled run into a
# non-fast-forward push failure.
concurrency:
  group: update-papers
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update
        id: update
        run: python update_papers.py

      # Incremental: only papers not yet in data/materials_cache.json are
      # processed, so this is cheap after the initial backlog. Failures must
      # not block the paper update itself.
      - name: Find open materials
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
        run: python find_materials.py --github-search

      - name: Generate analysis summaries
        run: python analysis/generate_summaries.py

      - name: Commit and push data changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ analysis/
          if git diff --quiet --cached; then
            echo "No data changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NEW="${{ steps.update.outputs.new_papers }}"
          git commit -m "Monthly update: ${NEW:-0} new papers"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      # Pushes made with the default GITHUB_TOKEN do not trigger `on: push`
      # workflows, so dispatch the Pages deploy explicitly when we committed.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml
